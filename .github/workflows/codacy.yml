name: Codacy Security Scan

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

permissions:
  contents: read

jobs:
  codacy-security-scan:
    permissions:
      contents: read
      security-events: write
      actions: read
    name: Codacy Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run Codacy Analysis CLI
        uses: codacy/codacy-analysis-cli-action@562ee3e92b8e92df8b67e0a5ff8aa8e261919c08
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          verbose: true
          output: results.sarif
          format: sarif
          gh-code-scanning-compat: true
          max-allowed-issues: 2147483647

      # 1) GitHub Code Scanning (since 2025-07) rejects multiple runs with the same category
      #    in one SARIF; Codacy emits several — give each run a unique automationDetails.id.
      #    https://github.blog/changelog/2025-07-21-code-scanning-will-stop-combining-multiple-sarif-runs-uploaded-in-the-same-sarif-file/
      # 2) Codacy embeds fingerprints that differ from GitHub's calculator → thousands of
      #    "inconsistent fingerprint" warnings. Strip them so upload-sarif recomputes.
      #    https://docs.github.com/en/code-security/code-scanning/integrating-with-code-scanning/sarif-support-for-code-scanning#providing-data-to-track-code-scanning-alerts-across-runs
      - name: Normalize SARIF for Code Scanning
        shell: bash
        run: |
          set -euo pipefail
          test -f results.sarif
          jq '
            .runs //= []
            | .runs |= [to_entries[] | .value + {
                automationDetails: ((.value.automationDetails // {}) + {id: ("Codacy/\(.key)")})
              }]
            | walk(
                if type == "object" then del(.fingerprints, .partialFingerprints) else . end
              )
          ' results.sarif > results.code-scanning.sarif

      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.code-scanning.sarif
          category: /tool:codacy
